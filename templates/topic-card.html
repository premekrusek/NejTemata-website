<li class="topic" data-tags="{{tag}}">
  <div class="topic-head">
    <h2>{{title}}</h2>
    <span class="tag">{{tag}}</span>
  </div>

  <p class="desc">{{description}}</p>

  <div class="answer">
    <p><strong>Rychlá odpověď:</strong> {{answer}}</p>
  </div>

  <div class="links">
    <a href="topics/{{slug}}.html">Více</a>
  </div>
</li>
